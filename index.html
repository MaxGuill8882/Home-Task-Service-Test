   GITHUB_TOKEN  : le jeton fine-grained créé plus haut
   ============================================================ */
const GITHUB_OWNER  = "MaxGuill8882";

/* ============================================================
   3) LES PERSONNES ET LEURS TÂCHES
   Chaque personne a maintenant son propre fichier de config :
   config/<id>.json  (ex: config/maxime.json)

   Structure attendue dans chaque fichier :
   {
     "nom": "Maxime",
     "type": "enfant",              // "parent" ou "enfant"
     "pin": "1111",                 // code à 4 chiffres
     "taches": {
       "lundi": ["Faire son lit", "..."],
       "mardi": [...],
       ... (tous les jours de la semaine)
     }
   }

   Pour ajouter/retirer une tâche : édite simplement le fichier
   JSON de la personne concernée, pas besoin de toucher au HTML.
   Pour ajouter une nouvelle personne : crée son fichier JSON dans
   config/ ET ajoute son identifiant dans la liste ci-dessous.
   ============================================================ */
const IDENTIFIANTS_PERSONNES = ["martin", "laurence", "maxime", "yannick", "myriam", "valerie"];

let PERSONNES = {};
let TACHES = {};

async function chargerConfigPersonnes(){
  const resultats = await Promise.all(
    IDENTIFIANTS_PERSONNES.map(async (id) => {
      try{
        const reponse = await fetch(`config/${id}.json`, { cache: "no-store" });
        if(!reponse.ok) throw new Error(`Fichier introuvable : config/${id}.json`);
        const data = await reponse.json();
        return { id, data };
      }catch(e){
        console.error(`Erreur de chargement pour "${id}":`, e);
        return { id, data: null };
      }
    })
  );

  resultats.forEach(({ id, data }) => {
    if(!data) return;
    PERSONNES[id] = { nom: data.nom, type: data.type, pin: data.pin, email: data.email || null };
    TACHES[id] = data.taches || {};
  });
}

      "--accent": "#E0A030", "--accent-doux": "#FBEBCF",
      "--valide": "#34C77B", "--danger": "#E0645A",
      "--ombre-c1": "#d6cdb8", "--ombre-c2": "#ffffff"

  },

      "--valide": "#3ED890", "--danger": "#FF7A70",
      "--ombre-c1": "#1a1d24", "--ombre-c2": "#2e333f"
    }
  }
};

function appliquerTheme(themeId){
  const theme = THEMES[themeId] || THEMES.bleu;
  const racine = document.documentElement;
  Object.entries(theme.variables).forEach(([variable, valeur])=>{
    racine.style.setProperty(variable, valeur);
  });
}

<script>
/* ============================================================
   INITIALISATION
   ============================================================ */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
emailjs.init(EMAILJS_PUBLIC_KEY);

const DOC_REF = db.collection("carnet_maison").doc("etat_taches");

const JOURS_SEMAINE = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];

let etatCourant = { completions: {}, profils: {} }; // synchronisé avec Firestore
let personneActive = null;             // clé de PERSONNES
let pinSaisi = "";
let dateAffichee = new Date();
let vueActuelle = "login"; // login | pin | taches
let editionProfilOuverte = false;

/* ---- Écoute en temps réel de Firestore ---- */
DOC_REF.onSnapshot((snap) => {
  if (snap.exists) {
    etatCourant = snap.data();
    if(!etatCourant.completions) etatCourant.completions = {};
    if(!etatCourant.profils) etatCourant.profils = {};
  } else {
    etatCourant = { completions: {}, profils: {} };
    DOC_REF.set(etatCourant);
  }
  rendre();
  verifierDigestQuotidien();
}, (err) => {
  console.error("Erreur Firestore :", err);
});

/* ---- Utilitaires date ---- */
function formatDateCle(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function nomJour(d){ return JOURS_SEMAINE[d.getDay()]; }
function texteDateLisible(d){
  const jourNom = d.toLocaleDateString('fr-FR', { weekday:'long' });
  const reste = d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  return { jourNom, reste };
}

/* ---- Clé de complétion unique ---- */
function cleCompletion(personneId, dateCle, index){
  return `${dateCle}_${personneId}_${index}`;
}

/* ---- Profils (thème + photo) ---- */
function obtenirProfil(personneId){
  return (etatCourant.profils && etatCourant.profils[personneId]) || {};
}

function rendreAvatar(personneId, classe){
  const profil = obtenirProfil(personneId);
  const nom = PERSONNES[personneId] ? PERSONNES[personneId].nom : "?";
  const initiale = nom.charAt(0).toUpperCase();
  if(profil.photo){
    return `<div class="avatar ${classe}"><img src="${profil.photo}" alt="${nom}" onerror="this.style.display='none'; this.parentElement.textContent='${initiale}';"></div>`;
  }
  return `<div class="avatar ${classe}">${initiale}</div>`;
}

function rendreAvatarEditable(personneId){
  const interieur = rendreAvatar(personneId, "avatar-grand").replace('class="avatar avatar-grand"', 'class="avatar avatar-grand" onclick="declencherChangementPhoto()"');
  return `<div style="position:relative;display:inline-block;">
      ${interieur}
      <div class="badge-camera">${ICONES.camera}</div>
    </div>`;
}

/* ============================================================
   ACTIONS
   ============================================================ */
function ouvrirEcranPin(id){
  personneActive = id;
  pinSaisi = "";
  vueActuelle = "pin";
  rendre();
}

function retourLogin(){
  personneActive = null;
  pinSaisi = "";
  vueActuelle = "login";
  appliquerTheme("bleu");
  rendre();
}

function saisirChiffre(chiffre){
  if(pinSaisi.length>=4) return;
  pinSaisi += chiffre;
  if(pinSaisi.length===4){
    if(pinSaisi === PERSONNES[personneActive].pin){
      vueActuelle = "taches";
      dateAffichee = new Date();
      appliquerTheme(obtenirProfil(personneActive).theme || "bleu");
      setTimeout(rendre, 120);
    } else {
      setTimeout(()=>{ pinSaisi=""; rendre(); document.getElementById("erreur-pin").textContent="Code incorrect, réessaie."; }, 250);
    }
  }
  rendre();
}

function effacerChiffre(){
  pinSaisi = pinSaisi.slice(0,-1);
  rendre();
}

function changerJour(delta){
  dateAffichee = new Date(dateAffichee);
  dateAffichee.setDate(dateAffichee.getDate()+delta);
  rendre();
}

function allerAujourdhui(){
  dateAffichee = new Date();
  rendre();
}

let enTraitement = new Set(); // empêche un double-clic d'envoyer 2x la même action
let actionEnAttente = null;   // {personneId, index, texte} en attente de confirmation dans la modale

function toggleTache(personneId, index){
  demanderConfirmation(personneId, index);
}

function demanderConfirmation(personneId, index){
  const jour = nomJour(dateAffichee);
  const texte = TACHES[personneId][jour][index];
  actionEnAttente = { personneId, index, texte };
  document.getElementById("texte-modale").innerHTML =
    `Confirmer que la tâche                   <strong>${texte}</strong> est terminée ?`;
  document.getElementById("fond-modale").style.display = "flex";
}

function annulerAction(){
  actionEnAttente = null;
  document.getElementById("fond-modale").style.display = "none";
}

function confirmerAction(){
  if(!actionEnAttente) return;
  const { personneId, index } = actionEnAttente;
  document.getElementById("fond-modale").style.display = "none";
  actionEnAttente = null;
  marquerTacheFaite(personneId, index);
}

async function marquerTacheFaite(personneId, index){
  const dateCle = formatDateCle(dateAffichee);
  const cle = cleCompletion(personneId, dateCle, index);

  // Verrou anti double-clic / double-tap
  if(enTraitement.has(cle)) return;
  enTraitement.add(cle);

  const nouvelEtat = { ...etatCourant, completions: { ...etatCourant.completions } };
  nouvelEtat.completions[cle] = {
    fait:true,
    valide:false,
    par: PERSONNES[personneId].nom,
    horodatage: new Date().toISOString()
  };

  // Mise à jour optimiste immédiate (locale)
  etatCourant = nouvelEtat;
  rendre();

  if(PERSONNES[personneId].type === "enfant"){
    const nomTache = TACHES[personneId][nomJour(dateAffichee)][index];
    notifierParents(PERSONNES[personneId].nom, nomTache);
  }

  try{
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur d'écriture Firestore:", e);
    alert("Impossible de synchroniser la tâche. Vérifie ta connexion internet.");
  } finally {
    enTraitement.delete(cle);
  }
}

/* ---- Réservé aux parents : décocher une tâche (annuler une complétion) ---- */
async function decocherTache(cle){
  const nouvelEtat = { ...etatCourant, completions: { ...etatCourant.completions } };
  delete nouvelEtat.completions[cle];
  etatCourant = nouvelEtat;
  rendre();
  try{
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur d'écriture Firestore:", e);
  }
}

async function validerTache(cle){
  const nouvelEtat = { ...etatCourant, completions: { ...etatCourant.completions } };
  if(nouvelEtat.completions[cle]){
    nouvelEtat.completions[cle] = { ...nouvelEtat.completions[cle], valide:true };
    try{
      await DOC_REF.set(nouvelEtat);
    }catch(e){
      console.error(e);
    }
  }
}

/* ---- Choix de thème ---- */
async function choisirTheme(themeId){
  appliquerTheme(themeId);
  const nouvelEtat = { ...etatCourant, profils: { ...etatCourant.profils } };
  nouvelEtat.profils[personneActive] = { ...obtenirProfil(personneActive), theme: themeId };
  etatCourant = nouvelEtat;
  rendre();
  try{
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur de sauvegarde du thème:", e);
  }
}

/* ============================================================
   PRÉFÉRENCES DE NOTIFICATION (parents seulement)
   Chaque parent choisit : courriel à chaque tâche complétée (immédiat)
   ou un seul résumé par jour à une heure choisie.
   Stocké dans etatCourant.profils[id].notifications
   ============================================================ */
function obtenirNotifPref(personneId){
  const profil = obtenirProfil(personneId);
  return profil.notifications || { mode: "immediat", heure: "18:00" };
}

function construireContenuNotif(mode, heure){
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:1.05rem;margin:0;">Notifications par courriel</h3>
      <button type="button" onclick="fermerParametresNotifications()" style="background:none;border:none;cursor:pointer;color:var(--texte-doux);width:22px;height:22px;padding:0;">${ICONES.fermer}</button>
    </div>
    <div class="options-notif">
      <button type="button" class="option-notif ${mode==='immediat'?'actif':''}" onclick="choisirModeNotif('immediat')">
        À chaque tâche complétée
      </button>
      <button type="button" class="option-notif ${mode==='quotidien'?'actif':''}" onclick="choisirModeNotif('quotidien')">
        Un résumé, une fois par jour
      </button>
    </div>
    <div id="champ-heure-notif" style="margin-top:14px; ${mode==='quotidien'?'':'display:none;'}">
      <label style="font-size:0.85rem;color:var(--texte-doux);display:block;margin-bottom:6px;">Heure du résumé</label>
      <input type="time" id="input-heure-notif" value="${heure}" class="champ-heure">
    </div>
    <button class="btn-confirmer" style="width:100%;margin-top:20px;" onclick="enregistrerParametresNotifications()">Enregistrer</button>
  `;
}

function ouvrirParametresNotifications(){
  if(!personneActive || PERSONNES[personneActive].type !== "parent") return;
  editionProfilOuverte = false;
  rendre();
  const pref = obtenirNotifPref(personneActive);
  const boite = document.getElementById("boite-notifications");
  boite.dataset.modeChoisi = pref.mode;
  boite.innerHTML = construireContenuNotif(pref.mode, pref.heure);
  document.getElementById("fond-modale-notifications").style.display = "flex";
}

function choisirModeNotif(mode){
  const boite = document.getElementById("boite-notifications");
  const heureInput = document.getElementById("input-heure-notif");
  const heureActuelle = (heureInput && heureInput.value) ? heureInput.value : (obtenirNotifPref(personneActive).heure || "18:00");
  boite.dataset.modeChoisi = mode;
  boite.innerHTML = construireContenuNotif(mode, heureActuelle);
}

function fermerParametresNotifications(){
  document.getElementById("fond-modale-notifications").style.display = "none";
}

async function enregistrerParametresNotifications(){
  const boite = document.getElementById("boite-notifications");
  const modeChoisi = boite.dataset.modeChoisi || obtenirNotifPref(personneActive).mode;
  const heureInput = document.getElementById("input-heure-notif");
  const heureChoisie = (heureInput && heureInput.value) ? heureInput.value : "18:00";

  const nouvelEtat = { ...etatCourant, profils: { ...etatCourant.profils } };
  nouvelEtat.profils[personneActive] = {
    ...obtenirProfil(personneActive),
    notifications: { mode: modeChoisi, heure: heureChoisie }
  };
  etatCourant = nouvelEtat;
  fermerParametresNotifications();
  rendre();
  try{
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur de sauvegarde des préférences de notification:", e);
  }
}

/* ---- Photo de profil (prise ou choisie depuis la galerie) ---- */
function declencherChangementPhoto(){
  document.getElementById("input-photo").click();
}

function basculerEditionProfil(){
  editionProfilOuverte = !editionProfilOuverte;
  rendre();
}

/* Choisir un thème depuis le menu ne ferme plus le menu (permet de comparer) */
function choisirThemeMenu(themeId){
  choisirTheme(themeId);
}

function redimensionnerImage(fichier, tailleMax){
  return new Promise((resolve, reject)=>{
    const lecteur = new FileReader();
    lecteur.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let { width, height } = img;
        if(width > height){
          if(width > tailleMax){ height *= tailleMax/width; width = tailleMax; }
        } else {
          if(height > tailleMax){ width *= tailleMax/height; height = tailleMax; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob)=> resolve(blob), "image/jpeg", 0.85);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    lecteur.onerror = reject;
    lecteur.readAsDataURL(fichier);
  });
}

/* ---- Convertit un Blob en base64 pur (sans le préfixe data:...) ---- */
function blobEnBase64(blob){
  return new Promise((resolve, reject)=>{
    const lecteur = new FileReader();
    lecteur.onload = () => resolve(lecteur.result.split(",")[1]);
    lecteur.onerror = reject;
    lecteur.readAsDataURL(blob);
  });
}

/* ---- Envoie la photo dans le repo GitHub (dossier photos-profil/) ---- */
async function televerserPhotoGitHub(blob, personneId){
  const chemin = `photos-profil/${personneId}.jpg`;
  const urlApi = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${chemin}`;
  const enTetes = {
    "Authorization": `Bearer ${GITHUB_TOKEN}`,
    "Content-Type": "application/json",
    "Accept": "application/vnd.github+json"
  };

  // Si le fichier existe déjà, GitHub exige son "sha" actuel pour le remplacer
  let sha = null;
  try{
    const resExistant = await fetch(`${urlApi}?ref=${GITHUB_BRANCH}`, { headers: enTetes });
    if(resExistant.ok){
      const donneesExistantes = await resExistant.json();
      sha = donneesExistantes.sha;
    }
  }catch(e){ /* le fichier n'existe probablement pas encore, ce n'est pas grave */ }

  const contenuBase64 = await blobEnBase64(blob);
  const corps = {
    message: `Photo de profil de ${personneId}`,
    content: contenuBase64,
    branch: GITHUB_BRANCH
  };
  if(sha) corps.sha = sha;

  const resEnvoi = await fetch(urlApi, {
    method: "PUT",
    headers: enTetes,
    body: JSON.stringify(corps)
  });

  if(!resEnvoi.ok){
    const erreur = await resEnvoi.text();
    throw new Error(`Échec de l'envoi vers GitHub (${resEnvoi.status}) : ${erreur}`);
  }

  // Cache-busting (?v=...) pour forcer le navigateur à recharger la nouvelle image
  return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${chemin}?v=${Date.now()}`;
}

async function gererFichierPhoto(event){
  const fichier = event.target.files[0];
  event.target.value = ""; // permet de reprendre la même photo une prochaine fois
  if(!fichier || !personneActive) return;

  try{
    const blob = await redimensionnerImage(fichier, 400);
    const url = await televerserPhotoGitHub(blob, personneActive);

    const nouvelEtat = { ...etatCourant, profils: { ...etatCourant.profils } };
    nouvelEtat.profils[personneActive] = { ...obtenirProfil(personneActive), photo: url };
    etatCourant = nouvelEtat;
    rendre();
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur d'upload de la photo:", e);
    alert("Impossible d'envoyer la photo. Vérifie ta connexion internet et le jeton GitHub.");
  }
}

/* ============================================================
   ENVOI DE COURRIELS — file d'attente + préférences par parent
   EmailJS (plan gratuit) limite à 1 requête toutes les 5 secondes.
   IMPORTANT : le champ "To Email" du template EmailJS doit utiliser
   la variable {{to_email}} (et non des adresses codées en dur),
   car chaque parent peut maintenant recevoir des courriels
   différents selon ses préférences.
   ============================================================ */
const DELAI_ENTRE_COURRIELS_MS = 5200; // légère marge au-dessus de 5s
let fileCourriels = [];
let fileEnCours = false;

function notifierParents(nomEnfant, nomTache){
  Object.entries(PERSONNES).forEach(([id, p])=>{
    if(p.type !== "parent" || !p.email) return;
    const pref = obtenirNotifPref(id);
    if(pref.mode === "quotidien") return; // ce parent recevra un résumé plus tard, pas un courriel immédiat
    fileCourriels.push({ email: p.email, nomEnfant, nomTache });
  });
  traiterFileCourriels();
}

function traiterFileCourriels(){
  if(fileEnCours) return;
  fileEnCours = true;

  const envoyerSuivant = () => {
    const item = fileCourriels.shift();
    if(!item){ fileEnCours = false; return; }

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: item.email,
      child_name: item.nomEnfant,
      task_name: item.nomTache,
      message: `${item.nomEnfant} a terminé "${item.nomTache}". Veuillez vérifier puis valider la complétion.`
    }).catch((err)=> console.error("Erreur EmailJS:", err));

    if(fileCourriels.length > 0){
      setTimeout(envoyerSuivant, DELAI_ENTRE_COURRIELS_MS);
    } else {
      fileEnCours = false;
    }
  };

  envoyerSuivant();
}

/* ============================================================
   RÉSUMÉ QUOTIDIEN (parents ayant choisi "une fois par jour")
   Approche "simple" : vérifiée à chaque chargement de l'app et à
   intervalle régulier tant que l'app reste ouverte. Si personne
   n'ouvre l'app autour de l'heure choisie, le résumé de ce jour-là
   peut être manqué (limite d'un site statique sans serveur).
   ============================================================ */
let digestEnCours = new Set();

function verifierDigestQuotidien(){
  if(Object.keys(PERSONNES).length === 0) return;
  const maintenant = new Date();
  const heureCourante = String(maintenant.getHours()).padStart(2,"0") + ":" + String(maintenant.getMinutes()).padStart(2,"0");
  const dateCle = formatDateCle(maintenant);

  Object.entries(PERSONNES).forEach(([id, p])=>{
    if(p.type !== "parent" || !p.email) return;
    const pref = obtenirNotifPref(id);
    if(pref.mode !== "quotidien") return;

    const cleDigest = `${dateCle}_${id}`;
    if(digestEnCours.has(cleDigest)) return;
    if(etatCourant.digestEnvoye && etatCourant.digestEnvoye[cleDigest]) return;
    if(heureCourante < pref.heure) return;

    const auMoinsUnePendante = Object.entries(etatCourant.completions || {}).some(([cle, info])=>
      cle.startsWith(dateCle + "_") && info.fait && !info.valide
    );
    if(!auMoinsUnePendante) return;

    digestEnCours.add(cleDigest);
    fileCourriels.push({ email: p.email, nomEnfant: "des enfants", nomTache: "Veuillez valider les tâches de la journée" });
    traiterFileCourriels();
    marquerDigestEnvoye(cleDigest);
  });
}

async function marquerDigestEnvoye(cleDigest){
  const nouvelEtat = { ...etatCourant, digestEnvoye: { ...(etatCourant.digestEnvoye||{}), [cleDigest]: true } };
  etatCourant = nouvelEtat;
  try{
    await DOC_REF.set(nouvelEtat);
  }catch(e){
    console.error("Erreur lors du marquage du résumé quotidien:", e);
  } finally {
    digestEnCours.delete(cleDigest);
  }
}

/* ============================================================
   RENDU
   ============================================================ */
function rendre(){
  const app = document.getElementById("app");

  if(vueActuelle === "login"){
    app.innerHTML = vueLogin();
  } else if(vueActuelle === "pin"){
    app.innerHTML = vuePin();
  } else if(vueActuelle === "taches"){
    app.innerHTML = vueTaches();
  }
}

function vueLogin(){
  const cartes = Object.entries(PERSONNES).map(([id,p])=>
    `<div class="carte-nom" onclick="ouvrirEcranPin('${id}')">
       ${rendreAvatar(id, 'avatar-nom')}
       ${p.nom}
     </div>`
  ).join("");

  return `
    <div class="entete">
      <h1>Le Carnet de la Maison</h1>
    </div>
    <div class="grille-noms">${cartes}</div>
  `;
}

function vuePin(){
  const points = [0,1,2,3].map(i=>
    `<div class="pin-point ${i<pinSaisi.length?'rempli':''}"></div>`
  ).join("");

  const touches = ["1","2","3","4","5","6","7","8","9","","0","⌫"].map(t=>{
    if(t==="") return `<div></div>`;
    if(t==="⌫") return `<div class="touche effacer" onclick="effacerChiffre()">⌫</div>`;
    return `<div class="touche" onclick="saisirChiffre('${t}')">${t}</div>`;
  }).join("");

  return `
    <div class="ecran-pin">
      <div class="retour" onclick="retourLogin()">← retour</div>
      <h2>Bonjour ${PERSONNES[personneActive].nom}</h2>
      <div class="sous-titre" style="font-size:0.8rem;color:var(--encre-douce);">Entre ton code à 4 chiffres</div>
      <div class="pin-points">${points}</div>
      <div class="pavé-numerique">${touches}</div>
      <div class="erreur-pin" id="erreur-pin"></div>
    </div>
  `;
}

function vueTaches(){
  const p = PERSONNES[personneActive];
  const dateCle = formatDateCle(dateAffichee);
  const jour = nomJour(dateAffichee);
  const { jourNom, reste } = texteDateLisible(dateAffichee);

  let contenuPrincipal = "";

  if(p.type === "enfant"){
    const taches = (TACHES[personneActive] && TACHES[personneActive][jour]) || [];
    if(taches.length===0){
      contenuPrincipal = `<div class="vide">Aucune tâche pour ${jourNom}. 🎉</div>`;
    } else {
      const lignes = taches.map((texte, index)=>{
        const cle = cleCompletion(personneActive, dateCle, index);
        const info = etatCourant.completions[cle];
        const fait = !!(info && info.fait);
        const valide = !!(info && info.valide);
        let classeCase = "case";
        let contenuCase = "";
        if(valide){ classeCase += " valide"; contenuCase = "✓"; }
        else if(fait){ classeCase += " fait"; contenuCase = "✓"; }

        return `
          <div class="tache" ${fait ? '' : `onclick="toggleTache('${personneActive}', ${index})"`}>
            <div class="${classeCase}">${contenuCase}</div>
            <div class="texte-tache ${fait?'fait':''}">${texte}</div>
            ${fait && !valide ? '<div class="etiquette-attente">à valider</div>' : ''}
          </div>
        `;
      }).join("");
      contenuPrincipal = `<div class="liste-taches">${lignes}</div>`;
    }
  } else {
    // Vue parent : voir toutes les tâches de tous les enfants pour le jour affiché + validation
    contenuPrincipal = `<div class="section-titre">Tâches de la famille — ${jourNom}</div>`;
    const enfants = Object.entries(PERSONNES).filter(([id,pp])=>pp.type==="enfant");
    let blocs = "";
    enfants.forEach(([id, pp])=>{
      const taches = (TACHES[id] && TACHES[id][jour]) || [];
      if(taches.length===0) return;
      const lignes = taches.map((texte,index)=>{
        const cle = cleCompletion(id, dateCle, index);
        const info = etatCourant.completions[cle];
        const fait = !!(info && info.fait);
        const valide = !!(info && info.valide);
        let classeCase="case";
        let contenuCase="";
        if(valide){classeCase+=" valide"; contenuCase="✓";}
        else if(fait){classeCase+=" fait"; contenuCase="✓";}
        return `
          <div class="tache" style="cursor:default;">
            <div class="${classeCase}">${contenuCase}</div>
            <div class="texte-tache ${fait?'fait':''}">${texte}</div>
            ${fait && !valide ? `<button class="bouton-valider" onclick="validerTache('${cle}')">Valider</button>` : ''}
          </div>
        `;
      }).join("");
      blocs += `<div class="carte-membre"><div class="titre-membre">${pp.nom}</div>${lignes}</div>`;
    });
    contenuPrincipal += blocs || `<div class="vide">Aucune tâche prévue aujourd'hui.</div>`;
  }

  const themeCourant = obtenirProfil(personneActive).theme || "bleu";
  const pastillesTheme = Object.entries(THEMES).map(([id, t])=>
    `<div class="pastille-theme ${themeCourant===id?'actif':''}" style="background:${t.swatch};" onclick="choisirThemeMenu('${id}')" title="${t.label}"></div>`
  ).join("");

  return `
    <div class="barre-haut">
      <div class="entete-personne">
        ${rendreAvatarEditable(personneActive)}
        <div class="bienvenue">Bonjour, ${p.nom}</div>
      </div>
      <div class="deconnexion" onclick="retourLogin()">Se déconnecter</div>
    </div>

    <div class="selecteur-jour">
      <div class="fleche" onclick="changerJour(-1)">‹</div>
      <div class="date-texte">
        <div class="jour-nom">${jourNom}</div>
        <div class="jour-num">${reste}</div>
      </div>
      <div class="fleche" onclick="changerJour(1)">›</div>
    </div>
    <button class="bouton-aujourdhui" onclick="allerAujourdhui()">Revenir à aujourd'hui</button>

    ${contenuPrincipal}
    <div class="conteneur-edition-profil">
      <div class="options-edition-profil" ${editionProfilOuverte ? '' : 'style="display:none;"'}>
        <div class="selecteur-theme">${pastillesTheme}</div>
        ${p.type === "parent" ? `<button class="bouton-option-edition" onclick="ouvrirParametresNotifications()" title="Notifications">${ICONES.cloche}</button>` : ''}
      </div>
      <button class="bouton-edition-profil ${editionProfilOuverte ? 'ouvert' : ''}" onclick="basculerEditionProfil()" title="${editionProfilOuverte ? 'Fermer les options' : 'Modifier le profil'}">${editionProfilOuverte ? ICONES.fermer : ICONES.crayon}</button>
    </div>
  `;
}

async function demarrer(){
  document.getElementById("app").innerHTML = `
    <div class="vide" style="padding-top:120px;">Chargement du carnet…</div>
  `;
  await chargerConfigPersonnes();
  rendre();
  verifierDigestQuotidien();
  setInterval(verifierDigestQuotidien, 5 * 60 * 1000); // revérifie toutes les 5 minutes
}

demarrer();
</script>
</body>
</html>
